name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Project Files
        run: |
          APP_NAME="My App"
          if [ -f "app-name.txt" ]; then
            APP_NAME=$(head -1 app-name.txt | tr -d '\r\n')
          fi

          mkdir -p app/src/main/java/com/myapp/webview
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          if [ -d "web" ]; then
            cp -r web/. app/src/main/assets/
          else
            echo "ERROR: web/ folder nahi mila!" && exit 1
          fi

          printf 'rootProject.name = "MyApp"\ninclude '"'"':app'"'"'\n' > settings.gradle

          printf 'buildscript {\n  repositories { google(); mavenCentral() }\n  dependencies { classpath '"'"'com.android.tools.build:gradle:8.2.0'"'"' }\n}\nallprojects { repositories { google(); mavenCentral() } }\n' > build.gradle

          printf 'android.useAndroidX=true\nandroid.enableJetifier=true\n' > gradle.properties

          printf 'plugins { id '"'"'com.android.application'"'"' }\nandroid {\n  namespace '"'"'com.myapp.webview'"'"'\n  compileSdk 34\n  defaultConfig {\n    applicationId "com.myapp.webview"\n    minSdk 21\n    targetSdk 34\n    versionCode 1\n    versionName "1.0"\n  }\n  buildTypes {\n    debug { minifyEnabled false }\n    release { minifyEnabled false }\n  }\n  compileOptions {\n    sourceCompatibility JavaVersion.VERSION_1_8\n    targetCompatibility JavaVersion.VERSION_1_8\n  }\n}\ndependencies {\n  implementation '"'"'androidx.appcompat:appcompat:1.6.1'"'"'\n}\n' > app/build.gradle

          printf '# ProGuard rules\n' > app/proguard-rules.pro

          cat > app/src/main/AndroidManifest.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET" />
    <application
        android:allowBackup="true"
        android:label="@string/app_name"
        android:icon="@mipmap/ic_launcher"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:theme="@style/Theme.MyApp"
        android:hardwareAccelerated="true"
        android:supportsRtl="true">
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:screenOrientation="portrait"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
XMLEOF

          cat > app/src/main/res/layout/activity_main.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent">
    <WebView android:id="@+id/webview"
        android:layout_width="match_parent"
        android:layout_height="match_parent" />
</RelativeLayout>
XMLEOF

          printf '<resources>\n    <string name="app_name">%s</string>\n</resources>\n' "$APP_NAME" > app/src/main/res/values/strings.xml

          cat > app/src/main/res/values/themes.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="Theme.MyApp" parent="Theme.AppCompat.Light.NoActionBar">
        <item name="android:windowFullscreen">true</item>
        <item name="android:windowBackground">@android:color/black</item>
    </style>
</resources>
XMLEOF

          cat > app/src/main/java/com/myapp/webview/MainActivity.java << 'JAVAEOF'
package com.myapp.webview;
import android.annotation.SuppressLint;
import android.os.Bundle;
import android.view.View;
import android.view.WindowManager;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import androidx.appcompat.app.AppCompatActivity;
public class MainActivity extends AppCompatActivity {
    private WebView webView;
    @SuppressLint("SetJavaScriptEnabled")
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
        if (getSupportActionBar() != null) getSupportActionBar().hide();
        setContentView(R.layout.activity_main);
        webView = findViewById(R.id.webview);
        WebSettings s = webView.getSettings();
        s.setJavaScriptEnabled(true);
        s.setDomStorageEnabled(true);
        s.setAllowFileAccess(true);
        s.setAllowContentAccess(true);
        s.setLoadWithOverviewMode(true);
        s.setUseWideViewPort(true);
        s.setBuiltInZoomControls(false);
        s.setDisplayZoomControls(false);
        s.setSupportZoom(false);
        webView.setScrollBarStyle(View.SCROLLBARS_INSIDE_OVERLAY);
        webView.setWebViewClient(new WebViewClient());
        webView.loadUrl("file:///android_asset/index.html");
    }
    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) webView.goBack();
        else super.onBackPressed();
    }
}
JAVAEOF

      - name: Generate App Icons
        run: |
          for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${entry%%:*}"
            size="${entry##*:}"
            convert -size ${size}x${size} xc:'#2196F3' app/src/main/res/mipmap-${density}/ic_launcher.png
            convert -size ${size}x${size} xc:'#2196F3' app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

      - name: Install Gradle and Fix Wrapper
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.7/bin/gradle wrapper
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
