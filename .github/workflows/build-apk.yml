name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Read App Name
        run: |
          if [ -f "app-name.txt" ]; then
            echo "APP_NAME=$(head -1 app-name.txt | tr -d '\r\n')" >> $GITHUB_ENV
          else
            echo "APP_NAME=My App" >> $GITHUB_ENV
          fi

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/myapp/webview
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          # Web files copy karo assets mein
          if [ -d "web" ]; then
            cp -r web/. app/src/main/assets/
            echo "Web files copied!"
          else
            echo "ERROR: web/ folder nahi mila!" && exit 1
          fi

          # App name file mein save karo
          echo "${{ env.APP_NAME }}" > /tmp/app_name.txt

          python3 << 'PYEOF'
import os

with open('/tmp/app_name.txt', 'r') as f:
    app_name = f.read().strip()

print(f"App name: {app_name}")

# settings.gradle
open('settings.gradle', 'w').write('rootProject.name = "MyApp"\ninclude \':app\'\n')

# Root build.gradle
open('build.gradle', 'w').write(
'''buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
}
allprojects {
    repositories { google(); mavenCentral() }
}
''')

# gradle.properties
open('gradle.properties', 'w').write(
'android.useAndroidX=true\nandroid.enableJetifier=true\n')

# app/build.gradle
open('app/build.gradle', 'w').write(
'''plugins { id 'com.android.application' }
android {
    namespace 'com.myapp.webview'
    compileSdk 34
    defaultConfig {
        applicationId "com.myapp.webview"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug { minifyEnabled false }
        release { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
''')

# app/proguard-rules.pro
open('app/proguard-rules.pro', 'w').write('# Default ProGuard rules\n')

# AndroidManifest.xml
open('app/src/main/AndroidManifest.xml', 'w').write(
'''<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET" />
    <application
        android:allowBackup="true"
        android:label="@string/app_name"
        android:icon="@mipmap/ic_launcher"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:theme="@style/Theme.MyApp"
        android:hardwareAccelerated="true"
        android:supportsRtl="true">
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:screenOrientation="portrait"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
''')

# MainActivity.java
open('app/src/main/java/com/myapp/webview/MainActivity.java', 'w').write(
'''package com.myapp.webview;
import android.annotation.SuppressLint;
import android.os.Bundle;
import android.view.View;
import android.view.WindowManager;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import androidx.appcompat.app.AppCompatActivity;
public class MainActivity extends AppCompatActivity {
    private WebView webView;
    @SuppressLint("SetJavaScriptEnabled")
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        getWindow().setFlags(
            WindowManager.LayoutParams.FLAG_FULLSCREEN,
            WindowManager.LayoutParams.FLAG_FULLSCREEN);
        if (getSupportActionBar() != null) getSupportActionBar().hide();
        setContentView(R.layout.activity_main);
        webView = findViewById(R.id.webview);
        WebSettings s = webView.getSettings();
        s.setJavaScriptEnabled(true);
        s.setDomStorageEnabled(true);
        s.setAllowFileAccess(true);
        s.setAllowContentAccess(true);
        s.setLoadWithOverviewMode(true);
        s.setUseWideViewPort(true);
        s.setBuiltInZoomControls(false);
        s.setDisplayZoomControls(false);
        s.setSupportZoom(false);
        webView.setScrollBarStyle(View.SCROLLBARS_INSIDE_OVERLAY);
        webView.setWebViewClient(new WebViewClient());
        webView.loadUrl("file:///android_asset/index.html");
    }
    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) webView.goBack();
        else super.onBackPressed();
    }
}
''')

# activity_main.xml
open('app/src/main/res/layout/activity_main.xml', 'w').write(
'''<?xml version="1.0" encoding="utf-8"?>
<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent">
    <WebView android:id="@+id/webview"
        android:layout_width="match_parent"
        android:layout_height="match_parent" />
</RelativeLayout>
''')

# strings.xml
open('app/src/main/res/values/strings.xml', 'w').write(
f'<resources>\n    <string name="app_name">{app_name}</string>\n</resources>\n')

# themes.xml
open('app/src/main/res/values/themes.xml', 'w').write(
'''<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="Theme.MyApp" parent="Theme.AppCompat.Light.NoActionBar">
        <item name="android:windowFullscreen">true</item>
        <item name="android:windowBackground">@android:color/black</item>
    </style>
</resources>
''')

print("All files created successfully!")
PYEOF

      - name: Generate App Icons
        run: |
          for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${entry%%:*}"
            size="${entry##*:}"
            convert -size ${size}x${size} xc:'#2196F3' \
              app/src/main/res/mipmap-${density}/ic_launcher.png
            convert -size ${size}x${size} xc:'#2196F3' \
              app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done
          echo "Icons generated!"

      - name: Install Gradle and Fix Wrapper
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.7/bin/gradle wrapper
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
